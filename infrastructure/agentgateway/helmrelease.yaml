apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: agentgateway
      version: v2.3.0
      sourceRef:
        kind: HelmRepository
        name: agentgateway
        namespace: flux-system
  targetNamespace: agentgateway-system
  install:
    crds: Create
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    disableWait: true
  values:
    replicaCount: 1  # Controller pod for XDS server
