apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: agentgateway
      version: v2.2.1
      sourceRef:
        kind: HelmRepository
        name: agentgateway
        namespace: flux-system
  targetNamespace: agentgateway-system
  install:
    crds: Create
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    disableWait: true
  values:
    # Fix startup probe timeout issues
    controller:
      startupProbe:
        initialDelaySeconds: 0
        timeoutSeconds: 5
        periodSeconds: 2
        successThreshold: 1
        failureThreshold: 120
      readinessProbe:
        initialDelaySeconds: 1
        timeoutSeconds: 1
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
