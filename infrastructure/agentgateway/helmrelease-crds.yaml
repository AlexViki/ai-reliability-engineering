apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: agentgateway-crds
      version: v2.2.1
      sourceRef:
        kind: HelmRepository
        name: agentgateway
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  namespace: agentgateway-system
  values: {}
