---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  interval: 1h
  releaseName: agentgateway
  dependsOn:
    - name: agentgateway-crds
      namespace: agentgateway-system
  chartRef:
    kind: OCIRepository
    name: agentgateway
    namespace: flux-system
  install:
    createNamespace: true