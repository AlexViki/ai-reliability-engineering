apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-config
  namespace: agentgateway-system
data:
  config.yaml: |
    ---
    # Agentgateway Configuration
    # LLM: Google Gemini 2.0 Flash
    
    log_level: info
    
    # Backends - LLM provider configuration
    backends:
      - name: google-gemini
        type: llm
        provider: google
        config:
          model: gemini-2.0-flash
          api_key_secret: gemini-api-keys
          api_key_field: GEMINI_API_KEY
          temperature: 0.7
          max_tokens: 2048
    
    # Policies for LLM access control and caching
    policies:
      - name: rate-limit-policy
        type: rate-limit
        config:
          requests_per_minute: 100
          burst: 10
          per_ip: true
      
      - name: semantic-cache-policy
        type: semantic-cache
        config:
          enabled: true
          ttl: 3600
          similarity_threshold: 0.95
      
      - name: auth-policy
        type: authentication
        config:
          enabled: true
          require_api_key: true
          jwt_validation: true
      
      - name: timeout-policy
        type: timeout
        config:
          request_timeout: 30s
          idle_timeout: 60s
    
    # Gateway API configuration
    gateway:
      port: 9978
      health_port: 9093
      metrics_port: 9092
      tls:
        enabled: false
    
    # UI Configuration
    ui:
      enabled: true
      port: 15000
      path: /ui
    
    # Observability
    observability:
      metrics:
        enabled: true
        port: 9092
