apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: gateway-api
  namespace: gateway-system
spec:
  interval: 5m
  chart:
    spec:
      chart: gateway-api
      version: "1.0.0"  # Adjust version as needed
      sourceRef:
        kind: HelmRepository
        name: gateway-api
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    # Enable Gateway API resources
    enableExperimentalFeatures: false
    webhook:
      enabled: true
