---
# Gateway resource for model routing through AgentGateway
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: agentgateway-gateway
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: grpc
    port: 50051
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  addresses:
  - type: Hostname
    value: agentgateway.local
---
# HTTPRoute for routing model requests to AgentGateway
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: gemini-model-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-gateway
    namespace: agentgateway-system
    sectionName: http
  hostnames:
  - "agentgateway.local"
  - "api.agentgateway.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/models
    - path:
        type: PathPrefix
        value: /v1/models
    backendRefs:
    - name: agentgateway
      namespace: agentgateway-system
      port: 9978
      weight: 100
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/agents
    - path:
        type: PathPrefix
        value: /v1/agents
    backendRefs:
    - name: agentgateway
      namespace: agentgateway-system
      port: 9978
      weight: 100
  - matches:
    - path:
        type: PathPrefix
        value: /api/
    backendRefs:
    - name: agentgateway
      namespace: agentgateway-system
      port: 9978
      weight: 100
---
# HTTPRoute for AgentGateway UI access
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: agentgateway-ui-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-gateway
    namespace: agentgateway-system
    sectionName: http
  hostnames:
  - "ui.agentgateway.local"
  - "dashboard.agentgateway.local"
  rules:
  - backendRefs:
    - name: agentgateway
      namespace: agentgateway-system
      port: 15000
      weight: 100
---
# HTTPRoute for Kagent UI access
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: kagent-ui-route
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-gateway
    namespace: agentgateway-system
    sectionName: http
  hostnames:
  - "kagent.local"
  - "agents.local"
  rules:
  - backendRefs:
    - name: kagent-system-kagent-ui
      namespace: kagent-system
      port: 8080
      weight: 100
