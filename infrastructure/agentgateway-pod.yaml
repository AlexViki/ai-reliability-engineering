apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgateway
  template:
    metadata:
      labels:
        app: agentgateway
    spec:
      containers:
      - name: agentgateway
        image: cr.agentgateway.dev/agentgateway:0.12.0
        args: ["-f", "/config.yaml"]
        env:
        - name: ADMIN_ADDR
          value: "0.0.0.0:15000"
        ports:
        - containerPort: 3000
        - containerPort: 15000
        volumeMounts:
        - name: config-volume
          mountPath: /config.yaml
          subPath: config.yaml
      volumes:
      - name: config-volume
        configMap:
          name: agentgateway-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-config
  namespace: agents
data:
  config.yaml: |
    binds:
    - port: 3000
      listeners:
      - routes:
        - policies:
            cors:
              allowOrigins:
              - "*"
              allowHeaders:
              - mcp-protocol-version
              - content-type
              - cache-control
              exposeHeaders:
              - "Mcp-Session-Id"
          backends:
          - mcp:
              targets:
              - name: everything
                stdio:
                  cmd: npx
                  args: ["@modelcontextprotocol/server-everything"]