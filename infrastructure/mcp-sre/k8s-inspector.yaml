apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-inspector
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-inspector-binding
subjects:
- kind: ServiceAccount
  name: k8s-inspector
  namespace: kagent
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-inspector
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-inspector
  template:
    metadata:
      labels:
        app: k8s-inspector
    spec:
      serviceAccountName: k8s-inspector
      containers:
      - name: mcp-server
        image: node:20-slim
        command: ["npx", "-y", "@modelcontextprotocol/server-kubernetes"]
        ports:
        - containerPort: 3000
          name: mcp
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-inspector
  namespace: kagent
spec:
  selector:
    app: k8s-inspector
  ports:
  - port: 3000
    targetPort: 3000
    name: mcp
