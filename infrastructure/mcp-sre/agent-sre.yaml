apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-inspector
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-inspector-binding
subjects:
- kind: ServiceAccount
  name: k8s-inspector
  namespace: kagent
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: k8s-inspector
  namespace: kagent
spec:
  transportType: stdio
  deployment:
    image: node:20-slim
    cmd: "npx -y @modelcontextprotocol/server-kubernetes"
    port: 3000
    serviceAccountName: k8s-inspector
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: sre-assistant
  namespace: kagent
spec:
  type: Declarative
  description: >
    Specialized AI assistant for Kubernetes reliability and troubleshooting.
  declarative:
    modelConfig: default-model-config
    tools:
    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: MCPServer
        name: k8s-inspector
