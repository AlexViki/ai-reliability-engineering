apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-inspector
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-inspector-binding
subjects:
- kind: ServiceAccount
  name: k8s-inspector
  namespace: kagent
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: k8s-inspector
  namespace: kagent
spec:
  transportType: stdio
  deployment:
    image: node:20-slim
    cmd: /bin/sh
    args:
    - "-c"
    - |
      if [ ! -f /usr/local/bin/kubectl-bin ]; then
        node -e "const https=require('https'),fs=require('fs');function dl(url,cb){https.get(url,r=>{if([301,302,307,308].includes(r.statusCode))return dl(r.headers.location,cb);const f=fs.createWriteStream('/usr/local/bin/kubectl-bin');r.pipe(f);f.on('finish',cb)}).on('error',e=>{process.stderr.write(e.message+'\n');process.exit(1)})}; dl('https://dl.k8s.io/release/v1.34.0/bin/linux/amd64/kubectl',()=>process.exit(0))"
        chmod +x /usr/local/bin/kubectl-bin
        echo '#!/bin/sh' > /usr/local/bin/kubectl
        echo 'exec /usr/local/bin/kubectl-bin --server=https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" "$@"' >> /usr/local/bin/kubectl
        chmod +x /usr/local/bin/kubectl
      fi
      exec npx -y mcp-server-kubernetes
    port: 3000
    serviceAccountName: k8s-inspector
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: sre-assistant
  namespace: kagent
spec:
  type: Declarative
  description: >
    Specialized AI assistant for Kubernetes reliability and troubleshooting.
  declarative:
    systemMessage: "You are an expert SRE assistant specializing in Kubernetes and FluxCD. Use your tools to inspect the cluster and provide diagnostics."
    modelConfig: default-model-config
    tools:
    - mcpServer:
        apiGroup: kagent.dev
        kind: MCPServer
        name: k8s-inspector
        namespace: kagent
        toolNames:
        - kubectl_get
        - kubectl_logs
        - kubectl_describe
        - list_api_resources
      type: McpServer
    - mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: kagent-tool-server
        namespace: kagent
        toolNames:
        - prometheus_query_tool
        - prometheus_targets_tool
        - shell
      type: McpServer
