---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 1h
  dependsOn:
    - name: kagent-crds
      namespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent
  # version: ">=0.1.0"
    namespace: flux-system
  values:
    labels:
      environment: dev
      team: ai-reliability-engineering
    agents:
      k8s-agent:
        enabled: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      observability-agent:
        enabled: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      kgateway-agent:
        enabled: false
      istio-agent:
        enabled: false
      promql-agent:
        enabled: false
      argo-rollouts-agent:
        enabled: false
      helm-agent:
        enabled: false
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
    providers:
      default: gemini
      gemini:
        provider: Gemini
        model: "gemini-2.0-flash-lite"
        apiKeySecretRef: gemini-api-keys
        apiKeySecretKey: GOOGLE_API_KEY
      # openAI:
      #   provider: OpenAI
      #   model: "gpt-4.1-mini"
      #   apiKeySecretRef: openai-api-keys
      #   apiKeySecretKey: OPENAI_API_KEY
  valuesFrom:
    - kind: Secret
      name: gemini-api-keys
      targetPath: providers.gemini.apiKey
      valuesKey: GOOGLE_API_KEY
    - kind: Secret
      name: openai-api-keys
      targetPath: providers.openAI.apiKey
      valuesKey: OPENAI_API_KEY

# kubectl apply -f ~/access/secrets.yaml 