---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 1h
  releaseName: kagent-crds
  chartRef:
    kind: OCIRepository
    name: kagent-crds
    namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace