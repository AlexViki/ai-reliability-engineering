apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagent
  namespace: kagent-system

---
apiVersion: v1
kind: Service
metadata:
  name: kagent
  namespace: kagent-system
spec:
  selector:
    app: kagent
  ports:
    - name: grpc
      port: 9979
      targetPort: 9979
    - name: health
      port: 9094
      targetPort: 9094
    - name: metrics
      port: 9095
      targetPort: 9095
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent
  namespace: kagent-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kagent
  template:
    metadata:
      labels:
        app: kagent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9095"
    spec:
      serviceAccountName: kagent
      containers:
      - name: kagent
        image: ghcr.io/kgateway-dev/kagent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 9979
        - name: health
          containerPort: 9094
        - name: metrics
          containerPort: 9095
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-api-keys
              key: google-api-key
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9094
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 9094
          initialDelaySeconds: 5
          periodSeconds: 5
