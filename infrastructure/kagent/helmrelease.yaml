apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kagent
      version: v1.0.0
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  targetNamespace: kagent-system
  install:
    crds: Create
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    disableWait: true
  values:
    # -- Configure the kagent control plane deployment.
    controller:
      replicaCount: 1
      logLevel: info
      service:
        type: ClusterIP
        ports:
          grpc: 9979
          health: 9094
          metrics: 9095
    
    # -- Configure container image.
    image:
      registry: ghcr.io/kgateway-dev
      repository: kagent
      pullPolicy: IfNotPresent
      tag: ""
    
    # -- Pod annotations for Prometheus scraping
    podAnnotations:
      prometheus.io/scrape: "true"
    
    # -- Resource limits and requests
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
