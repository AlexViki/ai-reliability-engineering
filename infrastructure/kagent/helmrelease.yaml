apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kagent-crds
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  targetNamespace: kagent-system
  install:
    crds: Create
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    disableWait: true
  values: {}

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: kagent-crds
  chart:
    spec:
      chart: kagent
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
  targetNamespace: kagent-system
  install:
    crds: Create
    disableWait: true
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    disableWait: true
  values:
    # LLM Provider Configuration - Gemini
    providers:
      default: gemini
      gemini:
        apiKey: GEMINI_API_KEY  # Will be replaced from Secret via envFrom
    
    # Controller configuration
    controller:
      env:
        - name: KAGENT_CONTROLLER_NAME
          value: kagent-controller
        - name: LOG_LEVEL
          value: info
      envFrom:
        - secretRef:
            name: kagent-llm-secrets
    
    # UI Configuration
    ui:
      enabled: true
      service:
        type: ClusterIP
        port: 8080
    
    # Resource configuration
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    # Pod annotations for Prometheus
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
